{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Nueva Alerta{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">Configurar Alerta de Stock</h4>
            </div>
            <div class="card-body">
                <form method="post" novalidate>
                    {% csrf_token %}
                    {{ form|crispy }}
                    
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i>
                        Recibirás una alerta cuando el stock del producto sea igual o menor al umbral configurado.
                    </div>
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'alert_list' %}" class="btn btn-outline">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> Guardar Alerta
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
