{% extends 'base.html' %}

{% block title %}Eliminar Dirección{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Confirmar Eliminación</h4>
            </div>
            <div class="card-body text-center">
                <p class="mb-4">¿Estás seguro de que deseas eliminar la dirección <strong>"{{ object.name }}"</strong>?</p>
                <p class="text-muted">{{ object.street }}, {{ object.city }}</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center gap-2">
                        <a href="{% url 'profile' %}" class="btn btn-outline">Cancelar</a>
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-trash"></i> Sí, Eliminar
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
