{% extends 'base.html' %}
{% load static %}

{% block title %}Solicitar Devolución{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="font-family: 'Playfair Display', serif; color: #c9a962;">Solicitar Devolución</h2>
                    <p class="text-muted">Pedido #{{ order.order_number }}</p>
                </div>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-bold">Motivo de la Devolución</label>
                        <select name="reason" class="form-control" required>
                            <option value="">Selecciona un motivo...</option>
                            <option value="defective">Producto defectuoso</option>
                            <option value="wrong_item">Producto incorrecto</option>
                            <option value="size_issue">Problema de talla</option>
                            <option value="not_as_described">No coincide con la descripción</option>
                            <option value="changed_mind">Cambio de opinión</option>
                            <option value="other">Otro</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Descripción</label>
                        <textarea name="description" class="form-control" rows="4" required placeholder="Describe el motivo de la devolución en detalle..."></textarea>
                    </div>

                    <div class="alert alert-info">
                        <i class="bi bi-info-circle"></i>
                        Los artículos de este pedido serán incluidos en la solicitud de devolución.
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'order_detail' order.pk %}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left"></i> Cancelar
                        </a>
                        <button type="submit" class="btn" style="background: #c9a962; color: #1a1a2e;">
                            <i class="bi bi-send"></i> Enviar Solicitud
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
