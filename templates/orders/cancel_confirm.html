{% extends 'base.html' %}

{% block title %}Cancelar Pedido{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5 text-center">
                <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
                <h3 class="fw-bold mt-3" style="font-family: 'Playfair Display', serif; color: #c9a962;">¿Cancelar Pedido?</h3>
                <p class="text-muted">Estás a punto de cancelar el pedido <strong>#{{ order.order_number }}</strong>.</p>
                <p class="text-muted">Esta acción no se puede deshacer.</p>

                <div class="d-flex justify-content-center gap-3 mt-4">
                    <a href="{% url 'order_detail' order.pk %}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                    <form method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">
                            <i class="bi bi-x-lg"></i> Sí, Cancelar Pedido
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
