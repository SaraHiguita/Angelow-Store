{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ANGELOW</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                ANGE<span>LOW</span>
            </div>

            {% if form.errors %}
            <div class="alert alert-danger">
                Usuario o contraseña incorrectos. Por favor intenta de nuevo.
            </div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" id="id_username" required autofocus>
                </div>

                <div class="mb-4">
                    <label for="id_password" class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>

                <button type="submit" class="btn w-100 mb-3 py-2 fw-bold" style="background: #c9a962; color: #1a1a2e;">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                </button>

                <input type="hidden" name="next" value="{{ next }}">
            </form>

            <div class="text-center mt-3">
                <p class="mb-1"><small>¿No tienes cuenta? <a href="{% url 'register' %}" style="color: #c9a962; text-decoration: none; font-weight: 600;">Regístrate</a></small></p>
                <p class="mb-1"><small><a href="{% url 'password_reset' %}" class="text-muted">¿Olvidaste tu contraseña?</a></small></p>
                <p class="mb-0"><small><a href="{% url 'shop_home' %}" class="text-muted"><i class="bi bi-arrow-left"></i> Volver a la tienda</a></small></p>
            </div>
        </div>
    </div>
</body>
</html>
