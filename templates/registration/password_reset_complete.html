{% extends 'base.html' %}
{% load static %}

{% block title %}Contraseña Cambiada{% endblock %}

{% block main_class %}container py-5{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5 text-center">
                <i class="bi bi-check-circle display-1" style="color: #28a745;"></i>
                <h3 class="fw-bold mt-3" style="font-family: 'Playfair Display', serif; color: #c9a962;">Contraseña Actualizada</h3>
                <p class="text-muted">Tu contraseña se ha cambiado exitosamente.</p>
                <a href="{% url 'login' %}" class="btn mt-3" style="background: #c9a962; color: #1a1a2e;">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
