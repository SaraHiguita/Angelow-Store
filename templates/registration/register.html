{% extends 'base.html' %}
{% load static %}

{% block title %}Registro{% endblock %}

{% block main_class %}container py-5{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card border-0 shadow-lg">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold" style="font-family: 'Playfair Display', serif; color: #c9a962;">Crear Cuenta</h2>
                    <p class="text-muted">Únete a ANGELOW</p>
                </div>

                <form method="post" action="{% url 'register' %}">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Nombre</label>
                            <input type="text" name="first_name" class="form-control" placeholder="Juan">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Apellido</label>
                            <input type="text" name="last_name" class="form-control" placeholder="Pérez">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Usuario *</label>
                        <input type="text" name="username" class="form-control" required placeholder="usuario123">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Correo Electrónico *</label>
                        <input type="email" name="email" class="form-control" required placeholder="correo@ejemplo.com">
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">Contraseña *</label>
                        <input type="password" name="password1" class="form-control" required minlength="8" placeholder="Mínimo 8 caracteres">
                    </div>

                    <div class="mb-4">
                        <label class="form-label small fw-bold">Confirmar Contraseña *</label>
                        <input type="password" name="password2" class="form-control" required placeholder="Repite la contraseña">
                    </div>

                    <button type="submit" class="btn w-100 py-2 fw-bold" style="background: #c9a962; color: #1a1a2e;">
                        <i class="bi bi-person-plus"></i> Crear Cuenta
                    </button>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small">¿Ya tienes cuenta?
                        <a href="{% url 'login' %}" class="text-decoration-none" style="color: #c9a962;">Inicia Sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
